<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photographs of wild walruses — Walrus</title>
  <meta name="description" content="Photographs of wild walruses.">

  <meta property="og:title" content="Photographs of wild walruses — Walrus">
  <meta property="og:description" content="Photographs of wild walruses.">
  <meta property="og:image" content="walrus-logo.png">

  <link rel="icon" type="image/png" href="walrus-logo.png">
  <link rel="apple-touch-icon" href="walrus-logo.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <header class="page-header">
      <a class="brand" href="index.html">
        <img class="mark-small" src="walrus-logo.png" alt="Walrus">
      </a>
    </header>

    <div class="photos">

      <figure class="photo">
        <img src="https://images.unsplash.com/photo-1687267842141-b98027296227?w=1400&q=80&fit=crop&auto=format" alt="A walrus emerging from the water with its mouth wide open" loading="lazy">
        <figcaption class="caption">I am the walrus. Or was it Paul? That is the question.</figcaption>
      </figure>

      <figure class="photo">
        <img src="https://images.unsplash.com/photo-1722846269257-5c9da399b0ea?w=1400&q=80&fit=crop&auto=format" alt="A walrus laying on the ground with long tusks" loading="lazy">
        <figcaption class="caption">Four hours after your friend told you the stuff in his bong is "not so strong."</figcaption>
      </figure>

      <figure class="photo">
        <img src="https://images.unsplash.com/photo-1719216325266-0a9140cab3e4?w=1400&q=80&fit=crop&auto=format" alt="A pair of walruses laying on top of an ice floe together" loading="lazy">
        <figcaption class="caption">Young female summer traine joined a male senior partner for vacation.</figcaption>
      </figure>

      <figure class="photo">
        <img src="https://images.unsplash.com/photo-1690941380217-24dfa9a1d21f?w=1400&q=80&fit=crop&auto=format" alt="A close-up portrait of a walrus showing its tusks" loading="lazy">
        <figcaption class="caption">Heavy is the head that carries the tusks. Heavier still is the weight of eternity against the fleeting nature of time.</figcaption>
      </figure>

      <figure class="photo">
        <img src="https://images.unsplash.com/photo-1660699059420-b405780404a8?w=1400&q=80&fit=crop&auto=format" alt="A group of walruses lounging together on a beach" loading="lazy">
        <figcaption class="caption">Trying to make yet another walrus.</figcaption>
      </figure>

    </div>
  </main>
  <footer>
    Walrus AS &middot; Org.nr 925&nbsp;629&nbsp;634
  </footer>
</body>
</html>
